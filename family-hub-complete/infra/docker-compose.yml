version: '3.9'
services:
  api:
    build:
      context: ./apps/api
      dockerfile: ../../infra/Dockerfile.api
    container_name: family-hub-api
    restart: unless-stopped
    ports: ["3001:3001"]
    env_file: [.env]
    environment: [PORT=3001]
    volumes: [api-data:/app/data]
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  ui:
    build:
      context: ./apps/ui
      dockerfile: ../../infra/Dockerfile.ui
    container_name: family-hub-ui
    restart: unless-stopped
    ports: ["5173:80"]
    depends_on:
      api:
        condition: service_healthy
volumes:
  api-data:
    driver: local
